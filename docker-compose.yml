services:
  # ─────────────────────────────────────────────────────────
  # GridLock OS — Python Application
  # ─────────────────────────────────────────────────────────
  gridlock-app:
    build: .
    container_name: gridlock-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - influxdb
    networks:
      - gridlock-net
    volumes:
      - ./src:/app/src:Z
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────
  # InfluxDB — Time-Series Database
  # ─────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: gridlock-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_TOKEN}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - gridlock-net

  # ─────────────────────────────────────────────────────────
  # Grafana — Live Dashboard
  # ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: gridlock-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb
    networks:
      - gridlock-net

# ─────────────────────────────────────────────────────────
# Named Volumes (persistent storage outside containers)
# ─────────────────────────────────────────────────────────
volumes:
  influxdb_data:
  grafana_data:

# ─────────────────────────────────────────────────────────
# Internal Network
# ─────────────────────────────────────────────────────────
networks:
  gridlock-net:
    driver: bridge
